<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>UrbanCart</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,Arial,sans-serif;background:#fff;color:#111827}.nav{display:flex;justify-content:space-between;padding:22px 7%;align-items:center;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:white;z-index:5}.logo{font-size:26px;font-weight:900}.cart{background:#111827;color:white;padding:10px 16px;border-radius:999px}.hero{padding:70px 7%;background:#f3f4f6;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}.hero h1{font-size:58px}.hero p{color:#6b7280;font-size:18px;margin:18px 0}.btn{background:#111827;color:white;padding:14px 24px;border-radius:12px;text-decoration:none;display:inline-block}.mock{height:350px;border-radius:30px;background:linear-gradient(135deg,#111827,#4b5563);display:grid;place-items:center;color:white;font-size:80px}.section{padding:60px 7%}.products{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.product{border:1px solid #e5e7eb;border-radius:20px;overflow:hidden}.pic{height:170px;background:linear-gradient(135deg,#e5e7eb,#cbd5e1);display:grid;place-items:center;font-size:52px}.info{padding:18px}.price{font-weight:900;font-size:22px}.add{margin-top:12px;width:100%;padding:12px;border:0;background:#111827;color:white;border-radius:10px}@media(max-width:850px){.hero,.products{grid-template-columns:1fr}.hero h1{font-size:40px}}</style></head><body><nav class="nav"><div class="logo">UrbanCart</div><div class="cart">Cart: <span id="count">0</span></div></nav><section class="hero"><div><h1>Premium products for modern living.</h1><p>Shop clean, stylish, and high-quality products with a smooth online shopping experience.</p><a href="#products" class="btn">Shop Now</a></div><div class="mock">🛍️</div></section><section class="section" id="products"><h2>Popular Products</h2><br><div class="products"><div class="product"><div class="pic">⌚</div><div class="info"><h3>Smart Watch</h3><p class="price">$59</p><button class="add">Add to Cart</button></div></div><div class="product"><div class="pic">🎧</div><div class="info"><h3>Headphones</h3><p class="price">$79</p><button class="add">Add to Cart</button></div></div><div class="product"><div class="pic">💻</div><div class="info"><h3>Laptop Sleeve</h3><p class="price">$29</p><button class="add">Add to Cart</button></div></div><div class="product"><div class="pic">📱</div><div class="info"><h3>Phone Case</h3><p class="price">$19</p><button class="add">Add to Cart</button></div></div></div></section><script>let c=0;document.querySelectorAll('.add').forEach(b=>b.onclick=()=>{document.getElementById('count').textContent=++c})</script></body></html>
